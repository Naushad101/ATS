version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ats-postgres
    environment:
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_password
      POSTGRES_DB: ats_db
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped


